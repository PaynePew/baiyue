name: deploy-baiyue

# Build the image, push to GHCR, then SSH to the shared box and roll the
# container. Image-pull model: no source tree on the box, only compose + .env.prod.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-baiyue
  cancel-in-progress: false

env:
  # GHCR requires a lowercase repo path; hardcode it (owner "PaynePew" would break the tag).
  IMAGE: ghcr.io/paynepew/baiyue

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Ship the compose file to the box (image-pull model: only runtime files live there).
      - name: Copy compose to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: box.paynepew.dev
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/baiyue/
      - name: Pull + roll + smoke
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: box.paynepew.dev
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/baiyue
            docker compose -f docker-compose.prod.yml pull baiyue
            docker compose -f docker-compose.prod.yml up -d baiyue
            # Smoke test from inside the container (no host port is published).
            sleep 5
            docker compose -f docker-compose.prod.yml exec -T baiyue \
              node -e "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
            echo "baiyue healthz OK"
