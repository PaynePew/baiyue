# Production compose for the shared box at /opt/baiyue/.
# Own compose project (name: baiyue) so scheduler's GitOps --remove-orphans
# never deletes this container. No host ports — reached only via the edge net.
name: baiyue

services:
  baiyue:
    image: ghcr.io/paynepew/baiyue:latest
    container_name: baiyue
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - PORT=3000
    # mem_limit is PROVISIONAL (256m wall = --max-old-space-size=256 + overhead).
    # Replace with the MEASURED docker-stats RSS before go-live (platform §2 capacity).
    mem_limit: 256m
    cpus: "0.5"
    networks: [default, edge]
    restart: unless-stopped
    # Service name "baiyue" on the edge net = exactly what Caddy reverse_proxies to (baiyue:3000).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

networks:
  edge:
    external: true
